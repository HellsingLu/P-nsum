<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homologación · Ingeniería de Software UNIMINUTO</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f3; --text: #1a1a18;
    --text-muted: #6b6b67; --text-hint: #9b9b97;
    --border: rgba(0,0,0,0.12); --border-md: rgba(0,0,0,0.22);
    --green-bg: #E1F5EE; --green-border: #5DCAA5; --green-text: #085041;
    --green-pill: #9FE1CB; --green-pill-text: #04342C; --green-strong: #1D9E75;
    --orange-strong: #D85A30; --orange-pill: #F5C4B3; --orange-pill-text: #4A1B0C;
    --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --radius-sm: 8px; --radius-md: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #262624; --text: #f0efe8;
      --text-muted: #a0a09a; --text-hint: #707068;
      --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.2);
      --green-bg: #04342C; --green-border: #1D9E75; --green-text: #9FE1CB;
      --green-pill: #0F6E56; --green-pill-text: #E1F5EE; --green-strong: #5DCAA5;
      --orange-strong: #F0997B; --orange-pill: #993C1D; --orange-pill-text: #FAECE7;
      --purple-bg: #26215C; --purple-text: #AFA9EC;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-secondary); color: var(--text); min-height: 100vh; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 1.25rem 1rem 1rem; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
  .logo { width: 36px; height: 36px; background: var(--green-bg); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 20px; height: 20px; }
  .header-titles h1 { font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.2; }
  .header-titles p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat { background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; border: 0.5px solid var(--border); }
  .stat-num { font-size: 22px; font-weight: 500; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 3px; line-height: 1.2; }
  .num-total { color: var(--text); }
  .num-hom { color: var(--green-strong); }
  .num-pend { color: var(--orange-strong); }
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn { background: transparent; border: 0.5px solid var(--border-md); border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer; color: var(--text-muted); white-space: nowrap; transition: all 0.15s; font-family: inherit; }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
  main { padding: 1rem; }
  @media (min-width: 900px) { main { max-width: 960px; margin: 0 auto; } header { padding: 1.5rem 2rem 1rem; } }
  .legend { display: flex; gap: 14px; margin-bottom: 1rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .dot-hom { background: var(--green-border); }
  .dot-pend { border: 0.5px solid var(--border-md); }
  .semester { margin-bottom: 1.25rem; }
  .sem-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .sem-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .sem-badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; }
  .badge-hom { background: var(--green-bg); color: var(--green-text); }
  .badge-pend { background: #FAECE7; color: #4A1B0C; }
  .badge-mixed { background: var(--purple-bg); color: var(--purple-text); }
  .courses-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
  @media (min-width: 600px) { .courses-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 900px) { .courses-grid { grid-template-columns: repeat(3, 1fr); } }
  .course-card { border-radius: var(--radius-sm); padding: 10px 12px; border: 0.5px solid; display: flex; flex-direction: column; gap: 6px; }
  .course-card.homologada { background: var(--green-bg); border-color: var(--green-border); }
  .course-card.por-cursar { background: var(--bg); border-color: var(--border); }
  .course-name { font-size: 13px; font-weight: 500; line-height: 1.35; }
  .homologada .course-name { color: var(--green-text); }
  .por-cursar .course-name { color: var(--text); }
  .course-meta { display: flex; justify-content: space-between; align-items: center; }
  .course-code { font-size: 10px; color: var(--text-hint); font-family: "SF Mono", "Fira Code", monospace; }
  .course-right { display: flex; align-items: center; gap: 6px; }
  .pill { font-size: 10px; border-radius: 20px; padding: 1px 7px; font-weight: 500; }
  .hom-pill { background: var(--green-pill); color: var(--green-pill-text); }
  .pend-pill { background: var(--orange-pill); color: var(--orange-pill-text); }
  .course-credits { font-size: 11px; font-weight: 500; }
  .homologada .course-credits { color: var(--green-strong); }
  .por-cursar .course-credits { color: var(--text-muted); }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1rem 0; }
  footer { text-align: center; padding: 1.5rem 1rem 2rem; font-size: 12px; color: var(--text-hint); }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
      </svg>
    </div>
    <div class="header-titles">
      <h1>Ingeniería de Software · UNIMINUTO</h1>
      <p>Homologación SENA — Programación de Software</p>
    </div>
  </div>
  <div class="summary-grid">
    <div class="stat"><div class="stat-num num-total">140</div><div class="stat-label">Créditos totales</div></div>
    <div class="stat"><div class="stat-num num-hom">63</div><div class="stat-label">Homologados ✓</div></div>
    <div class="stat"><div class="stat-num num-pend">77</div><div class="stat-label">Por cursar</div></div>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('homologada',this)">Homologadas</button>
    <button class="filter-btn" onclick="setFilter('por-cursar',this)">Por cursar</button>
  </div>
</header>
<main>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-hom"></div> Homologada (SENA)</div>
    <div class="legend-item"><div class="legend-dot dot-pend"></div> Por cursar</div>
  </div>
  <div id="semesters"></div>
</main>
<footer>Convenio SENA · UNIMINUTO · Registro Calificado SNIES 111235</footer>
<script>
const data = [
  { sem: "Primer semestre", courses: [
    { code:"INFO 1030", name:"Habilidades Digitales para el Aprendizaje", credits:3, hom:true },
    { code:"LENG 1040", name:"Lectura y Escritura en el Contexto Digital", credits:3, hom:true },
    { code:"UVFI D022", name:"Precálculo", credits:3, hom:true },
    { code:"FHUM 1010", name:"Proyecto de Vida", credits:2, hom:true },
    { code:"ISOF V003", name:"Introducción a la Ingeniería de Software", credits:3, hom:true },
  ]},
  { sem: "Segundo semestre", courses: [
    { code:"UVFI V011", name:"Álgebra Lineal", credits:3, hom:false },
    { code:"FHUM 1020", name:"Cátedra Minuto de Dios", credits:2, hom:false },
    { code:"ISOF V013", name:"Desarrollo de Software Orientado a Objetos", credits:3, hom:true },
    { code:"ISUD D063", name:"Infraestructura de TI", credits:3, hom:false },
  ]},
  { sem: "Tercer semestre", courses: [
    { code:"UVFI V051", name:"Matemáticas Discretas", credits:3, hom:false },
    { code:"UVFI D031", name:"Cálculo Diferencial", credits:3, hom:true },
    { code:"ISOF V023", name:"Estructura de Datos y Análisis de Algoritmos", credits:3, hom:true },
    { code:"ISOF V033", name:"Análisis y Diseño de Software", credits:3, hom:true },
    { code:"ISOF V043", name:"Sistemas de Gestión de Bases de Datos", credits:3, hom:false },
  ]},
  { sem: "Cuarto semestre", courses: [
    { code:"UVFI D061", name:"Cálculo Integral", credits:3, hom:true },
    { code:"ISOF V053", name:"Ingeniería de Software Avanzada", credits:3, hom:false },
    { code:"ISOF V063", name:"Desarrollo de Software Orientado a la Web", credits:3, hom:true },
    { code:"ISOF V073", name:"Data Warehouse y Minería de Datos", credits:3, hom:false },
    { code:"ISUD D103", name:"Sistemas Operativos", credits:3, hom:false },
  ]},
  { sem: "Quinto semestre", courses: [
    { code:"UVFI D041", name:"Física Mecánica", credits:3, hom:true },
    { code:"FHUM 1120", name:"Constitución Política", credits:2, hom:true },
    { code:"ISOF V083", name:"Diseño de Interfaces", credits:3, hom:false },
    { code:"ISOF V093", name:"Inteligencia de Negocios", credits:3, hom:false },
  ]},
  { sem: "Sexto semestre", courses: [
    { code:"UVFI V021", name:"Ecuaciones Diferenciales", credits:3, hom:true },
    { code:"ETIC 190", name:"Ética Profesional", credits:2, hom:true },
    { code:"ADMI 2000", name:"Emprendimiento", credits:3, hom:true },
    { code:"ISOF V103", name:"Pruebas de Software y Aseguramiento de la Calidad", credits:3, hom:false },
    { code:"ISOF V113", name:"Infraestructura en la Nube", credits:3, hom:false },
  ]},
  { sem: "Séptimo semestre", courses: [
    { code:"UVFI D141", name:"Física Electromagnética", credits:3, hom:true },
    { code:"ISOF V123", name:"Seguridad en el Desarrollo de Software", credits:3, hom:false },
    { code:"ISOF V133", name:"Desarrollo de Software en Plataformas Móviles", credits:3, hom:true },
    { code:"ISOF V143", name:"Ethical Hacking y Seguridad de la Información", credits:3, hom:false },
    { code:"ISOF V004", name:"Electivas CPC (Atelier)", credits:3, hom:false },
  ]},
  { sem: "Octavo semestre", courses: [
    { code:"UVFI V031", name:"Probabilidad y Estadística", credits:3, hom:true },
    { code:"PRAC 1010", name:"Práctica en Responsabilidad Social", credits:3, hom:false },
    { code:"ISOF V153", name:"Computación Bioinspirada", credits:3, hom:false },
    { code:"ISOF V163", name:"Inteligencia Artificial y Sistemas", credits:3, hom:false },
    { code:"ISOF V014", name:"Electivas CPC", credits:3, hom:true },
  ]},
  { sem: "Noveno semestre", courses: [
    { code:"UVFI V041", name:"Geometría", credits:3, hom:false },
    { code:"ISOF V173", name:"Gerencia de Proyectos de Software", credits:3, hom:true },
    { code:"ISOF V183", name:"Machine Learning", credits:3, hom:false },
    { code:"ISOF V193", name:"Plataformas de Desarrollo de Software", credits:3, hom:false },
    { code:"UVFI V061", name:"Fundamentos de Investigación", credits:3, hom:false },
  ]},
  { sem: "Décimo semestre", courses: [
    { code:"ISOF V203", name:"Administración y Gestión de la Configuración de Software", credits:3, hom:false },
    { code:"UVFI V071", name:"Metodología de la Investigación", credits:3, hom:false },
    { code:"ISOF V024", name:"Electivas CPC", credits:3, hom:true },
    { code:"ISOF V034", name:"Práctica Profesional", credits:6, hom:false },
  ]},
];

let currentFilter = 'all';

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const container = document.getElementById('semesters');
  container.innerHTML = '';
  data.forEach((sem, idx) => {
    const filtered = sem.courses.filter(c => {
      if (currentFilter === 'all') return true;
      return currentFilter === 'homologada' ? c.hom : !c.hom;
    });
    if (!filtered.length) return;
    const total = sem.courses.length;
    const homCount = sem.courses.filter(c => c.hom).length;
    const allHom = homCount === total, noneHom = homCount === 0;
    let badgeClass = 'badge-mixed', badgeText = homCount + '/' + total + ' homologadas';
    if (allHom) { badgeClass = 'badge-hom'; badgeText = 'Todas homologadas'; }
    if (noneHom) { badgeClass = 'badge-pend'; badgeText = 'Ninguna homologada'; }
    const semDiv = document.createElement('div');
    semDiv.className = 'semester';
    semDiv.innerHTML =
      '<div class="sem-header">' +
        '<span class="sem-title">' + sem.sem + '</span>' +
        '<span class="sem-badge ' + badgeClass + '">' + badgeText + '</span>' +
      '</div>' +
      '<div class="courses-grid">' +
        filtered.map(c =>
          '<div class="course-card ' + (c.hom ? 'homologada' : 'por-cursar') + '">' +
            '<div class="course-name">' + c.name + '</div>' +
            '<div class="course-meta">' +
              '<span class="course-code">' + c.code + '</span>' +
              '<div class="course-right">' +
                '<span class="pill ' + (c.hom ? 'hom-pill' : 'pend-pill') + '">' + (c.hom ? 'Homologada' : 'Por cursar') + '</span>' +
                '<span class="course-credits">' + c.credits + ' cr.</span>' +
              '</div>' +
            '</div>' +
          '</div>'
        ).join('') +
      '</div>' +
      (idx < data.length - 1 ? '<hr class="divider" style="margin-top:1rem">' : '');
    container.appendChild(semDiv);
  });
}
render();
</script>
</body>
</html>
